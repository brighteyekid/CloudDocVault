global:
  scrape_interval:     15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["localhost:9093"]

scrape_configs:
  - job_name: "clouddocvault_app"
    static_configs:
      - targets: ["localhost:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s

  - job_name: "node"
    static_configs:
      - targets: ["localhost:9100"]

  - job_name: "cloudwatch"
    static_configs:
      - targets: ["localhost:9106"]

  - job_name: "nginx"
    static_configs:
      - targets: ["localhost:9113"]
